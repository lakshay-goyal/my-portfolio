name: Deploy Portfolio

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build, Lint, and Deploy
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1
      AWS_REGION: ap-south-1

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Build Application
        run: npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan
        run: terraform plan -no-color
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color
        working-directory: terraform

      - name: Invalidate CloudFront Cache (CDN Direct Apply)
        run: |
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          echo "Invalidating CloudFront Distribution ID: $DIST_ID"
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
        working-directory: terraform

      - name: Sync Hostinger DNS to CloudFront (domain auto-connect)
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          DOMAIN: lakshaygoyal.in
        run: |
          if [ -z "${HOSTINGER_API_TOKEN}" ]; then
            echo "HOSTINGER_API_TOKEN not configured, skipping DNS sync"
            exit 0
          fi

          CDN_DOMAIN=$(terraform output -raw cloudfront_domain_name)
          echo "Pointing $DOMAIN at $CDN_DOMAIN"

          # Upsert apex ALIAS and www CNAME. overwrite=true only replaces records
          # matching the same name AND type, so other records (subdomains, ACM
          # validation CNAMEs) are left untouched.
          curl -sf -X PUT "https://developers.hostinger.com/api/dns/v1/zones/$DOMAIN" \
            -H "Authorization: Bearer $HOSTINGER_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"overwrite\": true,
              \"zone\": [
                {\"name\": \"@\",   \"type\": \"ALIAS\", \"ttl\": 300, \"records\": [{\"content\": \"$CDN_DOMAIN.\"}]},
                {\"name\": \"www\", \"type\": \"CNAME\", \"ttl\": 300, \"records\": [{\"content\": \"$CDN_DOMAIN.\"}]}
              ]
            }"

          # Remove any stale apex A record that would shadow the ALIAS.
          curl -sf -X DELETE "https://developers.hostinger.com/api/dns/v1/zones/$DOMAIN" \
            -H "Authorization: Bearer $HOSTINGER_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"filters":[{"name":"@","type":"A"}]}' || true

          echo "DNS sync complete"
        working-directory: terraform
